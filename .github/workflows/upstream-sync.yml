name: Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "upstream-sync-bot"
          git config user.email "upstream-sync-bot@users.noreply.github.com"
          git config rerere.enabled true
          git config rerere.autoupdate true

      - name: Add upstream remote
        run: |
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git

      - name: Run sync script
        id: sync
        run: |
          chmod +x ./scripts/sync-upstream.sh ./scripts/report-sync-conflicts.sh
          ./scripts/sync-upstream.sh
        continue-on-error: true

      - name: Load sync metadata
        if: always() && hashFiles('.sync-meta') != ''
        run: cat .sync-meta >> "$GITHUB_ENV"

      - name: Fail on sync script error without metadata
        if: always() && steps.sync.outcome == 'failure' && hashFiles('.sync-meta') == ''
        run: |
          echo "::error::Sync script failed before writing metadata. Check script logs above."
          exit 1

      - name: Upload conflict report
        if: always() && env.MERGE_STATUS == 'conflict'
        uses: actions/upload-artifact@v4
        with:
          name: sync-conflict-report
          path: ${{ env.REPORT_PATH }}

      - name: Push sync branch
        if: env.MERGE_STATUS == 'clean'
        run: |
          git push origin "${SYNC_BRANCH}:${SYNC_BRANCH}"

      - name: Render sync PR body
        if: env.MERGE_STATUS == 'clean'
        run: |
          chmod +x ./scripts/render-sync-pr-body.sh
          ./scripts/render-sync-pr-body.sh .sync-meta .github/pull_request_template/sync-pr.md .sync-pr-body.md

      - name: Create or update sync PR
        if: env.MERGE_STATUS == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE="sync: merge upstream into ${MAIN_BRANCH} (${SYNC_BRANCH})"
          PR_NUMBER=$(gh pr list --head "$SYNC_BRANCH" --base "$MAIN_BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body-file .sync-pr-body.md
          else
            gh pr create \
              --base "$MAIN_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "$PR_TITLE" \
              --body-file .sync-pr-body.md \
              --label upstream-sync
          fi

      - name: Create conflict issue
        if: env.MERGE_STATUS == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TITLE="sync conflict: ${SYNC_BRANCH}"
          gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file "$REPORT_PATH" \
            --label upstream-sync,conflict || true

      - name: Fail workflow on conflict
        if: env.MERGE_STATUS == 'conflict'
        run: |
          echo "Upstream sync requires manual conflict resolution."
          exit 1
